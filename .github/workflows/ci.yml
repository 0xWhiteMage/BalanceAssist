name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vitest run

  database:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: balance_assist_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d balance_assist_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/balance_assist_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:db:prepare
      - run: npm run test:db

  supabase-service-role:
    runs-on: ubuntu-latest
    env:
      TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
      TEST_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
      TEST_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      TEST_SUPABASE_PROJECT_REF: ${{ secrets.TEST_SUPABASE_PROJECT_REF }}
      ALLOW_TEST_SUPABASE_SERVICE_ROLE: 1
      REQUIRE_TEST_SUPABASE_SERVICE_ROLE: ${{ vars.REQUIRE_TEST_SUPABASE_SERVICE_ROLE || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run isolated Supabase service-role check
        shell: bash
        run: |
          if [ "$REQUIRE_TEST_SUPABASE_SERVICE_ROLE" != "1" ]; then
            echo "Skipping isolated Supabase service-role check: required mode is disabled."
            exit 0
          fi

          for name in TEST_SUPABASE_URL TEST_SUPABASE_SERVICE_ROLE_KEY TEST_SUPABASE_ANON_KEY TEST_SUPABASE_PROJECT_REF; do
            if [ -z "${!name}" ]; then
              echo "Required isolated Supabase configuration is missing: $name" >&2
              exit 1
            fi
          done

          npm run test:supabase:service-role

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  diff-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git diff --check

  e2e:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, database, build, diff-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Upload Playwright report and failures
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn

  telegram-webhook:
    needs: [lint, typecheck, test, database, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Configure Telegram webhook
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          SETUP_TOKEN: ${{ secrets.SETUP_TOKEN }}
        run: |
          if [ -z "$PRODUCTION_URL" ]; then
            echo "::warning::PRODUCTION_URL secret is not set. Skipping webhook setup."
            exit 0
          fi

          echo "Setting Telegram webhook to $PRODUCTION_URL/api/telegram/webhook"

          HEADERS=(-H "Content-Type: application/json")
          if [ -n "$SETUP_TOKEN" ]; then
            HEADERS+=(-H "Authorization: Bearer $SETUP_TOKEN")
          fi

          curl -fsS -X POST "${HEADERS[@]}" \
            -d "{\"webhookUrl\":\"${PRODUCTION_URL}/api/telegram/webhook\"}" \
            "${PRODUCTION_URL}/api/telegram/setup"

          echo ""
          echo "Verifying webhook..."

          curl -fsS "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/getWebhookInfo"

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
