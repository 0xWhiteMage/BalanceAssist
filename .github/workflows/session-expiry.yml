name: Expire temporary session drafts
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
permissions: {}
concurrency:
  group: session-expiry
  cancel-in-progress: false
jobs:
  expire:
    timeout-minutes: 2
    runs-on: ubuntu-latest
    steps:
      - name: Expire temporary session drafts
        shell: bash
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          test "$PRODUCTION_URL" = "https://balance-assist.vercel.app"
          test -n "$CRON_SECRET"
          curl --fail --silent --show-error --max-time 30 --request POST \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${PRODUCTION_URL}/api/internal/session-expiry"
          curl --fail --silent --show-error --max-time 30 --request POST \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            --header "Content-Type: application/json" \
            --data '{"worker":"session-expiry"}' \
            "${PRODUCTION_URL}/api/internal/scheduler-heartbeat"
