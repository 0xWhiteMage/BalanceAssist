name: Monday reconciliation

on:
  schedule:
    - cron: '23 2 * * 1'
  workflow_dispatch:

permissions: {}

concurrency:
  group: monday-reconcile
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Reconcile Monday CRM projection
        shell: bash
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 30 --request POST \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${PRODUCTION_URL}/api/internal/monday-reconcile"
          curl --fail --silent --show-error --max-time 30 --request POST \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            --header "Content-Type: application/json" \
            --data '{"worker":"monday-reconcile"}' \
            "${PRODUCTION_URL}/api/internal/scheduler-heartbeat"
