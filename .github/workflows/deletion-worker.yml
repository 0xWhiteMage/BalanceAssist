name: Process deletion requests
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
permissions: {}
concurrency:
  group: deletion-worker
  cancel-in-progress: false
jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Process durable deletion jobs
        shell: bash
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          for _ in $(seq 1 25); do
            curl --fail --silent --show-error --max-time 30 --request POST --header "Authorization: Bearer ${CRON_SECRET}" "${PRODUCTION_URL}/api/internal/deletion-worker"
          done
          curl --fail --silent --show-error --max-time 30 --request POST --header "Authorization: Bearer ${CRON_SECRET}" --header "Content-Type: application/json" --data '{"worker":"deletion-worker"}' "${PRODUCTION_URL}/api/internal/scheduler-heartbeat"
