name: Production release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Immutable commit SHA to release
        required: true
        type: string
      reviewed_sha:
        description: Exact commit SHA covered by all five discipline reviews
        required: true
        type: string
      product_review_ref:
        description: Product/UX review GitHub issue number
        required: true
        type: string
      engineering_review_ref:
        description: Engineering review GitHub issue number
        required: true
        type: string
      accessibility_review_ref:
        description: Accessibility review GitHub issue number
        required: true
        type: string
      conversation_review_ref:
        description: Conversation review GitHub issue number
        required: true
        type: string
      privacy_review_ref:
        description: Trust/privacy review GitHub issue number
        required: true
        type: string
      deployment_proof_ref:
        description: Deployment proof GitHub issue number
        required: true
        type: string

permissions:
  actions: read
  contents: read
  issues: read

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.validate.outputs.sha }}
    steps:
      - name: Validate release commit
        id: validate
        env:
          ACCESSIBILITY_REVIEW_REF: ${{ inputs.accessibility_review_ref }}
          CONVERSATION_REVIEW_REF: ${{ inputs.conversation_review_ref }}
          DEPLOYMENT_PROOF_REF: ${{ inputs.deployment_proof_ref }}
          ENGINEERING_REVIEW_REF: ${{ inputs.engineering_review_ref }}
          GITHUB_TOKEN: ${{ github.token }}
          PRIVACY_REVIEW_REF: ${{ inputs.privacy_review_ref }}
          PRODUCT_REVIEW_REF: ${{ inputs.product_review_ref }}
          RELEASE_REF: ${{ inputs.ref }}
          REVIEWED_SHA: ${{ inputs.reviewed_sha }}
          MIN_REVIEWERS: ${{ vars.RELEASE_MIN_REVIEWERS }}
          TRUSTED_REVIEWERS: ${{ vars.RELEASE_TRUSTED_REVIEWERS }}
        run: |
          set -euo pipefail
          test "$GITHUB_WORKFLOW_REF" = "$GITHUB_REPOSITORY/.github/workflows/production-release.yml@refs/heads/main"
          [[ "$MIN_REVIEWERS" =~ ^[1-5]$ ]]
          test -n "$TRUSTED_REVIEWERS"
          node <<'NODE'
          const entries = process.env.TRUSTED_REVIEWERS.split(',').map((login) => login.trim().toLowerCase());
          const validLogin = /^[a-z0-9](?:[a-z0-9-]{0,38})$/;
          const minimum = Number(process.env.MIN_REVIEWERS);
          const unique = new Set(entries);
          if (entries.some((login) => !validLogin.test(login)) || unique.size !== entries.length || unique.size < minimum) process.exit(1);
          NODE
          [[ "$RELEASE_REF" =~ ^[0-9a-f]{40}$ ]]
          test "$REVIEWED_SHA" = "$RELEASE_REF"
          for review_ref in "$PRODUCT_REVIEW_REF" "$ENGINEERING_REVIEW_REF" "$ACCESSIBILITY_REVIEW_REF" "$CONVERSATION_REVIEW_REF" "$PRIVACY_REVIEW_REF" "$DEPLOYMENT_PROOF_REF"; do
            [[ "$review_ref" =~ ^[1-9][0-9]{0,9}$ ]]
          done
          test "$(printf '%s\n' "$PRODUCT_REVIEW_REF" "$ENGINEERING_REVIEW_REF" "$ACCESSIBILITY_REVIEW_REF" "$CONVERSATION_REVIEW_REF" "$PRIVACY_REVIEW_REF" "$DEPLOYMENT_PROOF_REF" | sort -u | wc -l)" = "6"
          git init --quiet release
          cd release
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          git cat-file -e "$RELEASE_REF^{commit}"
          git merge-base --is-ancestor "$RELEASE_REF" origin/main
          release_sha="$(git rev-parse "$RELEASE_REF^{commit}")"
          proof_path="$(mktemp)"
          trap 'rm -f "$proof_path"' EXIT
          curl --fail --silent --show-error --retry 3 --retry-all-errors \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GITHUB_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --output "$proof_path" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs?head_sha=$release_sha&status=completed&per_page=100"
          node - "$proof_path" "$release_sha" <<'NODE'
          const fs = require('node:fs');
          const payload = JSON.parse(fs.readFileSync(process.argv[2], 'utf8'));
          const sha = process.argv[3];
          const proof = payload.workflow_runs?.filter((run) => run.head_sha === sha) ?? [];
          if (!proof.some((run) => run.status === 'completed' && run.conclusion === 'success' && run.event === 'push' && run.head_branch === 'main' && run.path === '.github/workflows/ci.yml')) process.exit(1);
          NODE
          validate_review() {
            local role="$1" issue="$2" review_path comments_path
            review_path="$(mktemp)"
            comments_path="$(mktemp)"
            curl --fail --silent --show-error --retry 3 --retry-all-errors \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer $GITHUB_TOKEN" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              --output "$review_path" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/issues/$issue"
            curl --fail --silent --show-error --retry 3 --retry-all-errors \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer $GITHUB_TOKEN" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              --output "$comments_path" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/issues/$issue/comments?per_page=100"
            node - "$review_path" "$comments_path" "$release_sha" "$role" <<'NODE'
          const fs = require('node:fs');
          const issue = JSON.parse(fs.readFileSync(process.argv[2], 'utf8'));
          const comments = JSON.parse(fs.readFileSync(process.argv[3], 'utf8'));
          const sha = process.argv[4];
          const role = process.argv[5];
          const body = issue.body ?? '';
          const labels = new Set((issue.labels ?? []).map((label) => typeof label === 'string' ? label : label.name));
          const line = (name, value) => new RegExp(`^${name}:\\s*${value}\\s*$`, 'm').test(body);
          const reviewer = body.match(/^Reviewer-GitHub:\s*@?([A-Za-z0-9](?:[A-Za-z0-9-]{0,38}))\s*$/m)?.[1];
          if (issue.pull_request || issue.state !== 'closed' || !labels.has('release-review') || !labels.has('release-approved')) process.exit(1);
          if (!line('Reviewed-SHA', sha) || !line('Review-Role', role) || !line('Decision', 'approved') || !line('Open-P0', '0') || !line('Open-P1', '0')) process.exit(1);
          if (!reviewer || !(issue.assignees ?? []).some((assignee) => assignee.login.toLowerCase() === reviewer.toLowerCase())) process.exit(1);
          const trustedReviewers = new Set((process.env.TRUSTED_REVIEWERS ?? '').split(',').map((login) => login.trim().toLowerCase()).filter(Boolean));
          if (!trustedReviewers.has(reviewer.toLowerCase())) process.exit(1);
          const approved = comments.some((comment) => comment.user?.login.toLowerCase() === reviewer.toLowerCase()
            && new RegExp(`^Reviewed-SHA:\\s*${sha}\\s*$`, 'm').test(comment.body ?? '')
            && new RegExp(`^Review-Role:\\s*${role}\\s*$`, 'm').test(comment.body ?? '')
            && /^Decision:\s*approved\s*$/m.test(comment.body ?? '')
            && /^Open-P0:\s*0\s*$/m.test(comment.body ?? '')
            && /^Open-P1:\s*0\s*$/m.test(comment.body ?? '')
            && !Number.isNaN(Date.parse(comment.created_at)));
          if (!approved) process.exit(1);
          fs.appendFileSync(process.env.REVIEWER_LIST, `${reviewer.toLowerCase()}\n`);
          NODE
            rm -f "$review_path" "$comments_path"
          }
          reviewer_list="$(mktemp)"
          export REVIEWER_LIST="$reviewer_list"
          validate_review product-ux "$PRODUCT_REVIEW_REF"
          validate_review engineering "$ENGINEERING_REVIEW_REF"
          validate_review accessibility "$ACCESSIBILITY_REVIEW_REF"
          validate_review conversation "$CONVERSATION_REVIEW_REF"
          validate_review trust-privacy "$PRIVACY_REVIEW_REF"
          test "$(sort -u "$reviewer_list" | wc -l)" -ge "$MIN_REVIEWERS"
          rm -f "$reviewer_list"
          echo "sha=$release_sha" >> "$GITHUB_OUTPUT"

  gates:
    needs: [validate]
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout validated release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ needs.validate.outputs.sha }}
          persist-credentials: false
        env:
          RELEASE_SHA: ${{ needs.validate.outputs.sha }}
      - name: Verify Vercel auto-deploy-disabled prerequisite
        env:
          VERCEL_GIT_DEPLOYMENTS_DISABLED_AT: ${{ vars.VERCEL_GIT_DEPLOYMENTS_DISABLED_AT }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$VERCEL_GIT_DEPLOYMENTS_DISABLED_AT"
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"
          test -n "$VERCEL_TOKEN"
          [[ "$VERCEL_GIT_DEPLOYMENTS_DISABLED_AT" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(\.[0-9]+)?Z$ ]]
          audited_at="$(date -u -d "$VERCEL_GIT_DEPLOYMENTS_DISABLED_AT" +%s)"
          now="$(date -u +%s)"
          test "$audited_at" -le "$now"
          test $((now - audited_at)) -le $((90 * 24 * 60 * 60))
          node --input-type=module <<'NODE'
          const headers = { Authorization: `Bearer ${process.env.VERCEL_TOKEN}` };
          const response = await fetch(`https://api.vercel.com/v9/projects/${process.env.VERCEL_PROJECT_ID}?teamId=${process.env.VERCEL_ORG_ID}`, { headers });
          if (!response.ok) throw new Error(`Vercel project lookup failed (${response.status})`);
          const project = await response.json();
          if (project.id !== process.env.VERCEL_PROJECT_ID) throw new Error('Vercel project ID does not match the protected configuration');
          if (project.accountId !== process.env.VERCEL_ORG_ID) throw new Error('Vercel account ID does not match the protected configuration');
          const [owner, repository] = process.env.GITHUB_REPOSITORY.split('/');
          if (!project.link?.type?.startsWith('github')) throw new Error('Vercel project is not linked to GitHub');
          if (project.link.org?.toLowerCase() !== owner.toLowerCase() || project.link.repo?.toLowerCase() !== repository.toLowerCase()) {
            throw new Error('Vercel project GitHub repository does not match the release repository');
          }
          const config = JSON.parse(await (await import('node:fs/promises')).readFile('vercel.json', 'utf8'));
          if (config.git?.deploymentEnabled?.main !== false) throw new Error('Vercel main-branch auto-deployment is not disabled');
          NODE
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .node-version
          cache: npm
      - uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1
      - run: npm ci
      - name: Verify Vercel production session configuration
        id: runtime-config
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"
          test -n "$VERCEL_TOKEN"
          config_path="$(mktemp)"
          trap 'rm -f "$config_path"' EXIT
          ./node_modules/.bin/vercel env pull "$config_path" --environment=production --token="$VERCEL_TOKEN" --yes
          node - "$config_path" <<'NODE'
          const fs = require('node:fs');
          const config = Object.fromEntries(
            fs.readFileSync(process.argv[2], 'utf8')
              .split(/\r?\n/)
              .filter((line) => line && !line.startsWith('#'))
              .map((line) => {
                const separator = line.indexOf('=');
                const value = line.slice(separator + 1).replace(/^"|"$/g, '');
                return [line.slice(0, separator), value];
              })
          );
          if (config.TRUSTED_CLIENT_IP_HEADER !== 'x-vercel-forwarded-for') process.exit(1);
          const expectedOrigins = new Set([
            'https://balancestudio.tv',
            'https://www.balancestudio.tv',
            'https://balance-assist.vercel.app',
          ]);
          const origins = (config.ALLOWED_ORIGINS ?? '').split(',').map((origin) => origin.trim());
          if (origins.length !== expectedOrigins.size || origins.some((origin) => !expectedOrigins.has(origin) || origin.includes('*'))) process.exit(1);
          const required = [
            'NEXT_PUBLIC_SUPABASE_URL', 'SUPABASE_PRIVATE_UPLOAD_BUCKET', 'DEEPSEEK_API_KEY',
            'TELEGRAM_BOT_TOKEN', 'TELEGRAM_CHAT_ID', 'TELEGRAM_WEBHOOK_SECRET',
             'TELEGRAM_ALLOWED_USER_IDS', 'SETUP_TOKEN', 'CRON_SECRET'
           ];
           if (required.some((name) => !config[name]?.trim())) process.exit(1);
           const telegramUserIds = config.TELEGRAM_ALLOWED_USER_IDS.split(',').map((value) => value.trim());
           if (telegramUserIds.some((value) => !/^[1-9]\d*$/.test(value) || !Number.isSafeInteger(Number(value)))) process.exit(1);
          if (!config.SUPABASE_SERVICE_ROLE_KEY?.trim() && !config.SUPABASE_SECRET_KEY?.trim()) process.exit(1);
          if (config.SUPABASE_PRIVATE_UPLOAD_BUCKET !== 'temporary-attachments') process.exit(1);
          if (config.MONDAY_UPSERT_ENABLED !== 'false' || config.MONDAY_CLEANUP_ENABLED !== 'false') process.exit(1);
          try {
            const supabase = new URL(config.NEXT_PUBLIC_SUPABASE_URL);
            if (supabase.protocol !== 'https:' || supabase.hostname !== 'vbdqjgwcmckutwehrbvo.supabase.co' || supabase.username || supabase.password || supabase.pathname !== '/' || supabase.search || supabase.hash) process.exit(1);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `supabase_url=${supabase.origin}\n`);
          } catch { process.exit(1); }
          NODE
      - name: Verify production trust schema readiness
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERCEL_SUPABASE_URL: ${{ steps.runtime-config.outputs.supabase_url }}
        run: |
          set -euo pipefail
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"
          test -n "$VERCEL_SUPABASE_URL"
          node <<'NODE'
          const expected = new URL(process.env.VERCEL_SUPABASE_URL);
          const actual = new URL(process.env.SUPABASE_URL);
          if (actual.protocol !== 'https:' || actual.username || actual.password || actual.pathname !== '/' || actual.search || actual.hash || actual.origin !== expected.origin) process.exit(1);
          NODE
          schema_path="$(mktemp)"
          trap 'rm -f "$schema_path"' EXIT
          curl --fail --silent --show-error --retry 3 --retry-all-errors --connect-timeout 5 --max-time 15 \
            --header "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            --header "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            --output "$schema_path" \
            "$SUPABASE_URL/rest/v1/schema_migrations?version=in.(054,055,056,057,058,059)&select=version,filename"
          node - "$schema_path" <<'NODE'
          const fs = require('node:fs');
          const expected = new Map([
            ['054', '054_human_contact_consent.sql'],
            ['055', '055_final_review_approval.sql'],
            ['056', '056_trust_centered_session_controls.sql'],
            ['057', '057_event_deletion_freeze.sql'],
            ['058', '058_unsent_crm_deletion.sql'],
            ['059', '059_consent_1_2_compatibility.sql'],
          ]);
          let rows;
          try { rows = JSON.parse(fs.readFileSync(process.argv[2], 'utf8')); } catch { process.exit(1); }
          if (!Array.isArray(rows) || rows.length !== expected.size) process.exit(1);
          for (const row of rows) {
            if (typeof row?.version !== 'string' || row.filename !== expected.get(row.version)) process.exit(1);
            expected.delete(row.version);
          }
          if (expected.size) process.exit(1);
          NODE
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
      - name: Run mandatory Supabase release proof
        env:
          REQUIRE_SUPABASE_RELEASE_PROOF: '1'
        run: npm run test:supabase
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm audit --omit=dev --audit-level=high
      - run: git diff --check
      - name: Stop local Supabase stack
        if: always()
        run: if command -v supabase >/dev/null; then supabase stop --no-backup; fi

  deploy:
    needs: [gates, validate]
    environment: production
    runs-on: ubuntu-latest
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
    steps:
      - name: Checkout validated release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ needs.validate.outputs.sha }}
          persist-credentials: false
        env:
          RELEASE_SHA: ${{ needs.validate.outputs.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - name: Deploy immutable Vercel candidate
        id: deploy
        env:
          RELEASE_SHA: ${{ needs.validate.outputs.sha }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"
          test -n "$VERCEL_TOKEN"
          GITHUB_SHA="$(git rev-parse HEAD)"
          test "$GITHUB_SHA" = "$RELEASE_SHA"
          ./node_modules/.bin/vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          ./node_modules/.bin/vercel build --prod --token="$VERCEL_TOKEN"
          deployment_url="$(./node_modules/.bin/vercel deploy --prebuilt --prod --skip-domain --token="$VERCEL_TOKEN" --meta githubCommitSha="$GITHUB_SHA")"
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"

  smoke:
    needs: [deploy, validate]
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Smoke immutable deployment
        env:
          DEPLOYMENT_URL: ${{ needs.deploy.outputs.deployment_url }}
          RELEASE_SHA: ${{ needs.validate.outputs.sha }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          test -n "$DEPLOYMENT_URL"
          test -n "$RELEASE_SHA"
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"
          curl --fail --silent --show-error --retry 3 --retry-all-errors --connect-timeout 5 --max-time 15 --output /dev/null "$DEPLOYMENT_URL/api/health"
          curl --fail --silent --show-error --retry 3 --retry-all-errors --connect-timeout 5 --max-time 15 --output /dev/null \
            --header "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            --header "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            "$SUPABASE_URL/rest/v1/schema_migrations?select=version&limit=1"
          probe_dir="$(mktemp -d)"
          trap 'rm -rf "$probe_dir"' EXIT
          consented_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          session_status="$(curl --silent --show-error --request POST --connect-timeout 5 --max-time 15 \
            --header "content-type: application/json" \
            --header "origin: https://balance-assist.vercel.app" \
            --data "{\"sourceUrl\":\"https://balance-assist.vercel.app/session-smoke\",\"consentVersion\":\"1.2\",\"consentedAt\":\"$consented_at\"}" \
            --cookie-jar "$probe_dir/cookies" \
            --dump-header "$probe_dir/session-headers" \
            --output "$probe_dir/session.json" \
            --write-out '%{http_code}' \
            "$DEPLOYMENT_URL/api/sessions")"
          test "$session_status" = "200"
          grep -Eqi '^set-cookie: session_capability=.*;[[:space:]]*HttpOnly([;[:space:]]|$)' "$probe_dir/session-headers"
          session_id="$(node - "$probe_dir/session.json" <<'NODE'
          const fs = require('node:fs');
          try {
            const session = JSON.parse(fs.readFileSync(process.argv[2], 'utf8'));
            if (session.persisted !== true || typeof session.sessionId !== 'string') process.exit(1);
            process.stdout.write(session.sessionId);
          } catch {
            process.exit(1);
          }
          NODE
          )"
          deletion_status="$(curl --silent --show-error --request POST --connect-timeout 5 --max-time 15 \
            --header "origin: https://balance-assist.vercel.app" \
            --cookie "$probe_dir/cookies" \
            --output "$probe_dir/deletion.json" \
            --write-out '%{http_code}' \
            "$DEPLOYMENT_URL/api/projects/$session_id/delete")"
          test "$deletion_status" = "200"
          node - "$probe_dir/deletion.json" <<'NODE'
          const fs = require('node:fs');
          try {
            const deletion = JSON.parse(fs.readFileSync(process.argv[2], 'utf8'));
            if (deletion.ok !== true || typeof deletion.receiptId !== 'string' || typeof deletion.receipt !== 'string' || deletion.status !== 'requested' || deletion.deleted !== false || typeof deletion.requestedAt !== 'string' || typeof deletion.updatedAt !== 'string') process.exit(1);
          } catch {
            process.exit(1);
          }
          NODE
          event_status="$(curl --silent --show-error --request POST --connect-timeout 5 --max-time 15 \
            --header "content-type: application/json" \
            --header "origin: https://balance-assist.vercel.app" \
            --cookie "$probe_dir/cookies" \
            --data "{\"sessionId\":\"$session_id\",\"eventName\":\"widget_closed\"}" \
            --output "$probe_dir/event.json" \
            --write-out '%{http_code}' \
            "$DEPLOYMENT_URL/api/events")"
          test "$event_status" = "409"
          node - "$probe_dir/event.json" <<'NODE'
          const fs = require('node:fs');
          try {
            const event = JSON.parse(fs.readFileSync(process.argv[2], 'utf8'));
            if (event.ok !== false || event.error !== 'event_session_inactive') process.exit(1);
          } catch { process.exit(1); }
          NODE

  migration:
    needs: [smoke, validate]
    environment: production-migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout validated release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ needs.validate.outputs.sha }}
          persist-credentials: false
        env:
          RELEASE_SHA: ${{ needs.validate.outputs.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - name: Apply production migrations
        env:
          EXPECTED_SUPABASE_PROJECT_REF: vbdqjgwcmckutwehrbvo
          PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          set -euo pipefail
          test -n "$PRODUCTION_DATABASE_URL"
          node --input-type=module <<'NODE'
          const database = new URL(process.env.PRODUCTION_DATABASE_URL);
          const projectRef = process.env.EXPECTED_SUPABASE_PROJECT_REF;
          const direct = database.hostname === `db.${projectRef}.supabase.co` && database.username === 'postgres';
          const pooled = database.hostname.endsWith('.pooler.supabase.com') && database.username === `postgres.${projectRef}`;
