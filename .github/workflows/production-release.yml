            assertRelease(/BEFORE INSERT ON public\.events FOR EACH ROW EXECUTE FUNCTION (?:public\.)?guard_event_session_active\(\)/i.test(row.trigger_definition), '057 trigger definition');
            assertRelease(row.prosrc.trim() === reviewedBody('supabase/migrations/057_event_deletion_freeze.sql', 'guard_event_session_active('), '057 function body');
            assertRelease(row.prosecdef === true && row.lanname === 'plpgsql' && row.result === 'trigger' && row.proconfig?.includes('search_path=public, pg_temp'), '057 function attributes');
            assertRelease(row.owner === 'postgres', '057 function owner');

            const live058 = await client.query(`
              SELECT m.filename, p.prosrc, p.prosecdef, p.proconfig, l.lanname,
                pg_get_userbyid(p.proowner) AS owner, pg_get_function_result(p.oid) AS result
              FROM public.schema_migrations m
              JOIN pg_proc p ON p.oid = 'public.queue_crm_lead_deletion(uuid,text)'::regprocedure
              JOIN pg_language l ON l.oid = p.prolang
