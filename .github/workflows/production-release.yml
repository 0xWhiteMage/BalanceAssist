          import fs from 'node:fs';
          import pg from 'pg';
          function reviewedBody(functionName) {
            const source = fs.readFileSync('supabase/migrations/061_api_security_retention_and_upload_quota.sql', 'utf8').replace(/\r\n/g, '\n');
            const signature = source.indexOf(`FUNCTION public.${functionName}`);
            const start = source.indexOf('AS $$', signature) + 5;
            const end = source.indexOf('\n$$;', start);
            if (signature < 0 || start < 5 || end < 0) process.exit(1);
            return source.slice(start, end).trim();
          }
          const client = new pg.Client({ connectionString: process.env.PRODUCTION_DATABASE_URL });
          try {
            await client.connect();
            const recorded = await client.query("SELECT filename FROM public.schema_migrations WHERE version = '061'");
            if (!recorded.rows.length) {
              await client.query(fs.readFileSync('supabase/production-api-security-061.sql', 'utf8'));
            } else if (recorded.rows.length !== 1 || recorded.rows[0].filename !== '061_api_security_retention_and_upload_quota.sql') {
              process.exit(1);
            }
            const table = await client.query(`
              SELECT c.relrowsecurity, pg_get_userbyid(c.relowner) AS owner,
                has_table_privilege('anon', c.oid, 'SELECT,INSERT,UPDATE,DELETE') AS anon_access,
                has_table_privilege('authenticated', c.oid, 'SELECT,INSERT,UPDATE,DELETE') AS authenticated_access,
                EXISTS (SELECT 1 FROM aclexplode(COALESCE(c.relacl, acldefault('r', c.relowner))) acl WHERE acl.grantee = 0) AS public_access
              FROM pg_class c
              WHERE c.oid = 'public.session_upload_reservations'::regclass
                AND EXISTS (SELECT 1 FROM public.schema_migrations WHERE version = '061' AND filename = '061_api_security_retention_and_upload_quota.sql')
            `);
            const reservations = table.rows[0];
            if (table.rows.length !== 1 || reservations.relrowsecurity !== true || reservations.owner !== 'postgres'
              || reservations.public_access !== false || reservations.anon_access !== false || reservations.authenticated_access !== false) process.exit(1);
