            assertRelease(crmDeletion.prosrc.trim() === reviewedBody('supabase/migrations/058_unsent_crm_deletion.sql', 'queue_crm_lead_deletion('), '058 function body');
            assertRelease(crmDeletion.prosecdef === true && crmDeletion.lanname === 'plpgsql' && crmDeletion.result === 'boolean' && crmDeletion.proconfig?.includes('search_path=public, pg_temp'), '058 function attributes');
