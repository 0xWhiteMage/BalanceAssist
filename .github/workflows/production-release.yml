name: Production release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Immutable commit SHA to release
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.validate.outputs.sha }}
    steps:
      - name: Validate release commit
        id: validate
        env:
          RELEASE_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          test "$GITHUB_WORKFLOW_REF" = "$GITHUB_REPOSITORY/.github/workflows/production-release.yml@refs/heads/main"
          [[ "$RELEASE_REF" =~ ^[0-9a-f]{40}$ ]]
          git init --quiet release
          cd release
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          git cat-file -e "$RELEASE_REF^{commit}"
          git merge-base --is-ancestor "$RELEASE_REF" origin/main
          release_sha="$(git rev-parse "$RELEASE_REF^{commit}")"
          echo "sha=$release_sha" >> "$GITHUB_OUTPUT"

  gates:
    needs: [validate]
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout validated release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ needs.validate.outputs.sha }}
        env:
          RELEASE_SHA: ${{ needs.validate.outputs.sha }}
      - name: Verify Vercel dashboard release control
        env:
          VERCEL_GIT_DEPLOYMENTS_DISABLED_AT: ${{ vars.VERCEL_GIT_DEPLOYMENTS_DISABLED_AT }}
        run: |
          set -euo pipefail
          test -n "$VERCEL_GIT_DEPLOYMENTS_DISABLED_AT"
          [[ "$VERCEL_GIT_DEPLOYMENTS_DISABLED_AT" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(\.[0-9]+)?Z$ ]]
          audited_at="$(date -u -d "$VERCEL_GIT_DEPLOYMENTS_DISABLED_AT" +%s)"
          now="$(date -u +%s)"
          test "$audited_at" -le "$now"
          test $((now - audited_at)) -le $((90 * 24 * 60 * 60))
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
      - uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
      - name: Verify Monday release-proof controls
        run: npm test -- tests/integration/monday-release-proof.test.ts
      - run: npm run test:supabase
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm audit --audit-level=high
      - run: git diff --check
      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --no-backup

  deploy:
    needs: [gates, validate]
    environment: production
    runs-on: ubuntu-latest
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
    steps:
      - name: Checkout validated release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ needs.validate.outputs.sha }}
        env:
          RELEASE_SHA: ${{ needs.validate.outputs.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Deploy immutable Vercel preview
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"
          test -n "$VERCEL_TOKEN"
          GITHUB_SHA="$(git rev-parse HEAD)"
          test "$GITHUB_SHA" = "$RELEASE_SHA"
          ./node_modules/.bin/vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          ./node_modules/.bin/vercel build --token="$VERCEL_TOKEN"
          deployment_url="$(./node_modules/.bin/vercel deploy --prebuilt --token="$VERCEL_TOKEN" --meta githubCommitSha="$GITHUB_SHA")"
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"

  smoke:
    needs: [deploy, validate]
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Smoke immutable deployment
        env:
          DEPLOYMENT_URL: ${{ needs.deploy.outputs.deployment_url }}
          RELEASE_SHA: ${{ needs.validate.outputs.sha }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          test -n "$DEPLOYMENT_URL"
          test -n "$RELEASE_SHA"
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"
          curl --fail --silent --show-error --retry 3 --retry-all-errors --connect-timeout 5 --max-time 15 --output /dev/null "$DEPLOYMENT_URL/api/health"
          curl --fail --silent --show-error --retry 3 --retry-all-errors --connect-timeout 5 --max-time 15 --output /dev/null \
            --header "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            --header "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            "$SUPABASE_URL/rest/v1/schema_migrations?select=version&limit=1"

  migration:
    needs: [smoke, validate]
    environment: production-migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout validated release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ needs.validate.outputs.sha }}
        env:
          RELEASE_SHA: ${{ needs.validate.outputs.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Apply production migrations
        env:
          PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          set -euo pipefail
          test -n "$PRODUCTION_DATABASE_URL"
          # The runner enforces expand-only SQL; cleanup needs a separate approved workflow.
          node scripts/apply-production-migrations.mjs

  promote:
    needs: [deploy, migration, validate]
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout validated release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ needs.validate.outputs.sha }}
        env:
          RELEASE_SHA: ${{ needs.validate.outputs.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Promote immutable deployment
        env:
          DEPLOYMENT_URL: ${{ needs.deploy.outputs.deployment_url }}
          RELEASE_SHA: ${{ needs.validate.outputs.sha }}
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$DEPLOYMENT_URL"
          test -n "$RELEASE_SHA"
          test -n "$PRODUCTION_URL"
          test -n "$VERCEL_TOKEN"
          ./node_modules/.bin/vercel alias set "$DEPLOYMENT_URL" "$PRODUCTION_URL" --token="$VERCEL_TOKEN"
      - name: Smoke promoted production alias
        env:
          RELEASE_SHA: ${{ needs.validate.outputs.sha }}
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          test -n "$RELEASE_SHA"
          test -n "$PRODUCTION_URL"
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"
          curl --fail --silent --show-error --retry 3 --retry-all-errors --connect-timeout 5 --max-time 15 --output /dev/null "$PRODUCTION_URL/api/health"
          curl --fail --silent --show-error --retry 3 --retry-all-errors --connect-timeout 5 --max-time 15 --output /dev/null \
            --header "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            --header "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            "$SUPABASE_URL/rest/v1/schema_migrations?select=version&limit=1"

  telegram:
    needs: [promote, validate]
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Configure Telegram webhook
        env:
          RELEASE_SHA: ${{ needs.validate.outputs.sha }}
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          SETUP_TOKEN: ${{ secrets.SETUP_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$RELEASE_SHA"
          test -n "$PRODUCTION_URL"
          test -n "$SETUP_TOKEN"
          test -n "$TELEGRAM_BOT_TOKEN"
          curl --fail --silent --show-error --request POST \
            --header "Content-Type: application/json" \
            --header "Authorization: Bearer $SETUP_TOKEN" \
            --data "{\"webhookUrl\":\"$PRODUCTION_URL/api/telegram/webhook\"}" \
            "$PRODUCTION_URL/api/telegram/setup"
          curl --fail --silent --show-error "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/getWebhookInfo"
