  deployment-review:
    needs: [deploy, migration, validate]
    environment: production-release-review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout validated release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ needs.validate.outputs.sha }}
          persist-credentials: false
        env:
          RELEASE_SHA: ${{ needs.validate.outputs.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Verify immutable deployment entry accessibility
        env:
          DEPLOYMENT_URL: ${{ needs.deploy.outputs.deployment_url }}
          RELEASE_SHA: ${{ needs.validate.outputs.sha }}
        run: node scripts/verify-deployment-widget.mjs
      - name: Verify approved deployment proof record
        env:
          DEPLOYMENT_PROOF_ISSUE: ${{ inputs.deployment_proof_ref }}
          DEPLOYMENT_URL: ${{ needs.deploy.outputs.deployment_url }}
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ needs.validate.outputs.sha }}
          TRUSTED_REVIEWERS: ${{ vars.RELEASE_TRUSTED_REVIEWERS }}
        run: |
          set -euo pipefail
          proof_path="$(mktemp)"
          comments_path="$(mktemp)"
          trap 'rm -f "$proof_path" "$comments_path"' EXIT
          curl --fail --silent --show-error --retry 3 --retry-all-errors \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GITHUB_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --output "$proof_path" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/issues/$DEPLOYMENT_PROOF_ISSUE"
          curl --fail --silent --show-error --retry 3 --retry-all-errors \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GITHUB_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --output "$comments_path" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/issues/$DEPLOYMENT_PROOF_ISSUE/comments?per_page=100"
          node - "$proof_path" "$comments_path" <<'NODE'
          const fs = require('node:fs');
          const issue = JSON.parse(fs.readFileSync(process.argv[2], 'utf8'));
          const comments = JSON.parse(fs.readFileSync(process.argv[3], 'utf8'));
          const body = issue.body ?? '';
          const labels = new Set((issue.labels ?? []).map((label) => typeof label === 'string' ? label : label.name));
          const line = (name, value) => new RegExp(`^${name}:\\s*${value}\\s*$`, 'm').test(body);
          const deploymentOrigin = new URL(process.env.DEPLOYMENT_URL).origin.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const reviewer = body.match(/^Reviewer-GitHub:\s*@?([A-Za-z0-9](?:[A-Za-z0-9-]{0,38}))\s*$/m)?.[1];
          if (issue.pull_request || issue.state !== 'closed' || !labels.has('release-review') || !labels.has('release-approved')) process.exit(1);
          if (!reviewer || !(issue.assignees ?? []).some((assignee) => assignee.login.toLowerCase() === reviewer.toLowerCase())) process.exit(1);
          if (!line('Reviewed-SHA', process.env.RELEASE_SHA) || !line('Review-Role', 'deployment-proof') || !line('Deployment-Origin', deploymentOrigin) || !line('Decision', 'approved') || !line('Open-P0', '0') || !line('Open-P1', '0')) process.exit(1);
          for (const proof of ['Desktop-AI-Entry', 'Mobile-AI-Entry', 'Desktop-Human-Entry', 'Mobile-Human-Entry', 'Confidential-Diversion', 'Relay-Queued', 'Relay-Delivered', 'Relay-Replied']) {
            if (!line(proof, 'passed')) process.exit(1);
          }
          const trustedReviewers = new Set((process.env.TRUSTED_REVIEWERS ?? '').split(',').map((login) => login.trim().toLowerCase()).filter(Boolean));
          if (!trustedReviewers.has(reviewer.toLowerCase())) process.exit(1);
          const approved = comments.some((comment) => comment.user?.login.toLowerCase() === reviewer.toLowerCase()
            && new RegExp(`^Reviewed-SHA:\\s*${process.env.RELEASE_SHA}\\s*$`, 'm').test(comment.body ?? '')
            && /^Review-Role:\s*deployment-proof\s*$/m.test(comment.body ?? '')
            && new RegExp(`^Deployment-Origin:\\s*${deploymentOrigin}\\s*$`, 'm').test(comment.body ?? '')
            && /^Decision:\s*approved\s*$/m.test(comment.body ?? '')
            && /^Open-P0:\s*0\s*$/m.test(comment.body ?? '')
            && /^Open-P1:\s*0\s*$/m.test(comment.body ?? '')
            && ['Desktop-AI-Entry', 'Mobile-AI-Entry', 'Desktop-Human-Entry', 'Mobile-Human-Entry', 'Confidential-Diversion', 'Relay-Queued', 'Relay-Delivered', 'Relay-Replied'].every((proof) => new RegExp(`^${proof}:\\s*passed\\s*$`, 'm').test(comment.body ?? ''))
            && !Number.isNaN(Date.parse(comment.created_at)));
          if (!approved) process.exit(1);
          NODE

