name: Monday lifecycle

on:
  schedule:
    - cron: '17 0 * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: monday-lifecycle
  cancel-in-progress: false

jobs:
  lifecycle:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Queue due Monday CRM lifecycle work
        shell: bash
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 30 --request POST \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${PRODUCTION_URL}/api/internal/monday-lifecycle"
          curl --fail --silent --show-error --max-time 30 --request POST \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            --header "Content-Type: application/json" \
            --data '{"worker":"monday-lifecycle"}' \
            "${PRODUCTION_URL}/api/internal/scheduler-heartbeat"
