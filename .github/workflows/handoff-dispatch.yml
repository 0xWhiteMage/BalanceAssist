name: Handoff dispatch

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: handoff-dispatch
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Dispatch pending handoffs
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 30 --request POST \
            --header "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.PRODUCTION_URL }}/api/internal/handoff-dispatch"
