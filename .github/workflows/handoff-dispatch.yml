name: Handoff dispatch

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: handoff-dispatch
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Dispatch pending handoffs
        shell: bash
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          test "$PRODUCTION_URL" = "https://balance-assist.vercel.app"
          test -n "$CRON_SECRET"
          curl --fail --silent --show-error --max-time 80 --request POST \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${PRODUCTION_URL}/api/internal/handoff-dispatch"
          curl --fail --silent --show-error --max-time 15 --request POST \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            --header "Content-Type: application/json" \
            --data '{"worker":"handoff-dispatch"}' \
            "${PRODUCTION_URL}/api/internal/scheduler-heartbeat"
