name: Production orphaned private attachment cleanup 045

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Immutable commit SHA containing reviewed cleanup migration 045
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: production-cleanup-migrations
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.validate.outputs.sha }}
    steps:
      - name: Validate trusted cleanup workflow and commit
        id: validate
        env:
          RELEASE_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          test "$GITHUB_WORKFLOW_REF" = "$GITHUB_REPOSITORY/.github/workflows/production-orphaned-private-attachment-cleanup-045.yml@refs/heads/main"
          [[ "$RELEASE_REF" =~ ^[0-9a-f]{40}$ ]]
          git init --quiet release
          cd release
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          git cat-file -e "$RELEASE_REF^{commit}"
          git merge-base --is-ancestor "$RELEASE_REF" origin/main
          release_sha="$(git rev-parse "$RELEASE_REF^{commit}")"
          echo "sha=$release_sha" >> "$GITHUB_OUTPUT"

  cleanup:
    needs: [validate]
    environment: production-cleanup-migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout validated release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ needs.validate.outputs.sha }}
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - name: Validate backup and apply reviewed cleanup artifact
        env:
          GH_TOKEN: ${{ github.token }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PRODUCTION_BACKUP_AUDIT_REFERENCE: ${{ secrets.PRODUCTION_BACKUP_AUDIT_REFERENCE }}
          RELEASE_SHA: ${{ needs.validate.outputs.sha }}
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$PRODUCTION_BACKUP_AUDIT_REFERENCE"
          test "$(git rev-parse HEAD)" = "$RELEASE_SHA"
          [[ "$PRODUCTION_BACKUP_AUDIT_REFERENCE" =~ ^BACKUP_AUDIT:[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(\.[0-9]+)?Z\|[a-z0-9][a-z0-9._-]{0,63}\|[A-Za-z0-9][A-Za-z0-9._:-]{0,127}\|[0-9a-f]{40}$ ]]
          IFS='|' read -r backup_at backup_provider backup_id backup_release_sha <<< "${PRODUCTION_BACKUP_AUDIT_REFERENCE#BACKUP_AUDIT:}"
          attested_at="$(date -u -d "$backup_at" +%s)"
          now="$(date -u +%s)"
          test "$attested_at" -le "$now"
          test $((now - attested_at)) -le $((24 * 60 * 60))
          test "$backup_release_sha" = "$RELEASE_SHA"
          test "$backup_provider" = "supabase-project-snapshot"
          [[ "$backup_id" =~ ^ynwdsmgfirhqwkvzxzsj-run-([0-9]+)$ ]]
          backup_run_id="${BASH_REMATCH[1]}"
          run_path="$(mktemp)"
          artifacts_path="$(mktemp)"
          latest_runs_path="$(mktemp)"
          archive_path="$(mktemp)"
          manifest_dir="$(mktemp -d)"
          trap 'rm -f "$run_path" "$artifacts_path" "$latest_runs_path" "$archive_path"; rm -rf "$manifest_dir"' EXIT
          curl --fail --silent --show-error --location \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --output "$run_path" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/runs/$backup_run_id"
          curl --fail --silent --show-error --location \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --output "$artifacts_path" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/runs/$backup_run_id/artifacts?per_page=100"
          curl --fail --silent --show-error --location \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --output "$latest_runs_path" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/workflows/production-cleanup-backup.yml/runs?event=workflow_dispatch&per_page=1"
          artifact_url="$(node - "$run_path" "$artifacts_path" "$latest_runs_path" "$RELEASE_SHA" "$backup_run_id" <<'NODE'
          const fs = require('fs');
          const run = JSON.parse(fs.readFileSync(process.argv[2], 'utf8'));
          const artifacts = JSON.parse(fs.readFileSync(process.argv[3], 'utf8')).artifacts ?? [];
          const latestRuns = JSON.parse(fs.readFileSync(process.argv[4], 'utf8')).workflow_runs ?? [];
          const sha = process.argv[5];
          const runId = process.argv[6];
          if (run.event !== 'workflow_dispatch' || run.conclusion !== 'success' || run.head_sha !== sha
            || run.path !== '.github/workflows/production-cleanup-backup.yml') process.exit(1);
          if (latestRuns.length !== 1 || String(latestRuns[0].id) !== runId) process.exit(1);
          const artifact = artifacts.find((candidate) => candidate.name === `cleanup-backup-manifest-${runId}` && !candidate.expired);
          if (!artifact?.archive_download_url) process.exit(1);
          process.stdout.write(artifact.archive_download_url);
          NODE
          )"
          curl --fail --silent --show-error --location \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --output "$archive_path" "$artifact_url"
          unzip -q "$archive_path" -d "$manifest_dir"
          node - "$manifest_dir/backup-manifest.json" "$backup_at" "$backup_provider" "$backup_id" "$backup_release_sha" <<'NODE'
          const fs = require('fs');
          const manifest = JSON.parse(fs.readFileSync(process.argv[2], 'utf8'));
          const [createdAt, provider, backupId, releaseSha] = process.argv.slice(3);
          if (manifest.version !== 1 || manifest.createdAt !== createdAt || manifest.provider !== provider
            || manifest.backupId !== backupId || manifest.releaseSha !== releaseSha || manifest.sealed !== true
            || manifest.sourceProjectRef !== 'vbdqjgwcmckutwehrbvo'
            || manifest.targetProjectRef !== 'ynwdsmgfirhqwkvzxzsj'
            || !/^[0-9a-f]{64}$/.test(manifest.publicSchema?.dumpSha256 ?? '')
            || !/^[0-9a-f]{64}$/.test(manifest.storage?.aggregateSha256 ?? '')) process.exit(1);
          NODE
          node scripts/apply-production-orphaned-private-attachment-cleanup-045.mjs --dry-run
          npx --no-install supabase link --project-ref vbdqjgwcmckutwehrbvo --yes
          npx --no-install supabase db query --linked --file supabase/production-orphaned-private-attachment-cleanup-045.sql

  smoke:
    needs: [cleanup, validate]
    environment: production-cleanup-migrations
    runs-on: ubuntu-latest
    steps:
      - name: Smoke post-cleanup production health
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          RELEASE_SHA: ${{ needs.validate.outputs.sha }}
        run: |
          set -euo pipefail
          test -n "$RELEASE_SHA"
          test -n "$PRODUCTION_URL"
          curl --fail --silent --show-error --retry 3 --retry-all-errors --connect-timeout 5 --max-time 15 --output /dev/null "$PRODUCTION_URL/api/health"
